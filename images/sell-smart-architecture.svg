<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a2e; }
      .ts { font-size: 12px; font-weight: 400; fill: #4a4a6a; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#f8f8fc" rx="12"/>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#333">Sell Smart — System Architecture</text>

  <!-- USER -->
  <rect x="270" y="36" width="140" height="52" rx="8" fill="#e8e8f0" stroke="#b0b0cc" stroke-width="0.5"/>
  <text class="th" x="340" y="57" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#2d2d4e">User</text>
  <text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#5a5a7a">Browser · mobile</text>

  <!-- Arrow user → frontend -->
  <line x1="340" y1="88" x2="340" y2="118" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- FRONTEND outer box -->
  <rect x="40" y="118" width="600" height="136" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="340" y="138" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#3b1fa8">Frontend · GitHub Pages</text>
  <text x="340" y="154" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#6d45c0">Single HTML/CSS/JS file · no framework · no build step</text>

  <!-- Upload UI -->
  <rect x="58" y="165" width="160" height="72" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="138" y="187" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#3b1fa8" dominant-baseline="central">Upload UI</text>
  <text x="138" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">Drag &amp; drop photos</text>
  <text x="138" y="221" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">12 photo max</text>

  <!-- Canvas API -->
  <rect x="260" y="165" width="160" height="72" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="340" y="187" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#3b1fa8" dominant-baseline="central">Canvas API</text>
  <text x="340" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">Client-side compress</text>
  <text x="340" y="221" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">280KB · 900KB passes</text>

  <!-- Listing Cards -->
  <rect x="462" y="165" width="160" height="72" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="542" y="187" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#3b1fa8" dominant-baseline="central">Listing cards</text>
  <text x="542" y="205" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">Title · price · tags</text>
  <text x="542" y="221" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#6d45c0" dominant-baseline="central">Copy · download</text>

  <!-- Arrow frontend → proxy -->
  <line x1="340" y1="254" x2="340" y2="292" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="358" y="276" font-family="Inter,sans-serif" font-size="11" fill="#888" dominant-baseline="central">HTTPS POST</text>

  <!-- PROXY box -->
  <rect x="140" y="292" width="400" height="58" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="340" y="314" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#065f46" dominant-baseline="central">Serverless proxy · Vercel / Cloud Run</text>
  <text x="340" y="334" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#047857" dominant-baseline="central">Holds API key server-side · CORS · retry logic</text>

  <!-- Arrow proxy → Gemini -->
  <line x1="340" y1="350" x2="340" y2="390" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="358" y="373" font-family="Inter,sans-serif" font-size="11" fill="#888" dominant-baseline="central">Google Cloud API</text>

  <!-- GEMINI box -->
  <rect x="140" y="390" width="400" height="58" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="412" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#78350f" dominant-baseline="central">Gemini 2.5 Flash · Google Cloud AI</text>
  <text x="340" y="432" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#92400e" dominant-baseline="central">Multimodal vision · batch grouping · listing copy</text>

  <!-- Arrow Gemini → Analysis call -->
  <line x1="260" y1="448" x2="200" y2="468" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow Gemini → Listing call -->
  <line x1="420" y1="448" x2="480" y2="468" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Analysis call -->
  <rect x="60" y="468" width="220" height="38" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="0.5"/>
  <text x="170" y="483" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#78350f" dominant-baseline="central">Analysis call</text>
  <text x="170" y="498" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#92400e" dominant-baseline="central">Group photos · extract metadata</text>

  <!-- Listing call -->
  <rect x="400" y="468" width="220" height="38" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="0.5"/>
  <text x="510" y="483" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#78350f" dominant-baseline="central">Listing call</text>
  <text x="510" y="498" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#92400e" dominant-baseline="central">Per item · platform copy</text>

</svg>
